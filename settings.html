<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMS Portal | Settings</title>
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/app.css">
  <link rel="stylesheet" href="styles/employees.css">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <div class="app-layout">
    <!-- Mobile Sidebar Drawer Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleMobileSidebar()"></div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-brand">
        <div class="logo-icon"><i class="fa-solid fa-people-roof"></i></div>
        <span>EMS Platform</span>
      </div>

      <div class="sidebar-user">
        <img id="user-avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=placeholder" alt="User Avatar">
        <div class="sidebar-user-info">
          <span id="user-name" class="sidebar-user-name">Loading...</span>
          <span id="user-role" class="sidebar-user-role">Guest</span>
        </div>
      </div>

      <nav class="sidebar-menu-wrapper">
        <ul class="sidebar-menu">
          <li class="sidebar-menu-item" id="nav-dashboard">
            <a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> <span>Dashboard</span></a>
          </li>
          <li class="sidebar-menu-item" id="nav-employees">
            <a href="employees.html"><i class="fa-solid fa-users"></i> <span>Employees</span></a>
          </li>
          <li class="sidebar-menu-item" id="nav-departments">
            <a href="departments.html"><i class="fa-solid fa-sitemap"></i> <span>Departments</span></a>
          </li>
          <li class="sidebar-menu-item" id="nav-payroll">
            <a href="payroll.html"><i class="fa-solid fa-wallet"></i> <span id="payroll-nav-title">Payroll</span></a>
          </li>
          <li class="sidebar-menu-item active" id="nav-settings">
            <a href="settings.html"><i class="fa-solid fa-gear"></i> <span>Settings</span></a>
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <button onclick="Auth.logout()" class="btn sidebar-logout">
          <i class="fa-solid fa-arrow-right-from-bracket"></i> <span>Log Out</span>
        </button>
      </div>
    </aside>

    <!-- Content Screen panel -->
    <main class="content-wrapper">
      <!-- App Header Bar -->
      <header class="app-header">
        <div style="display: flex; align-items: center; gap: 16px;">
          <button class="header-btn menu-toggle-btn" onclick="toggleMobileSidebar()">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="header-title">
            <h1>Account Settings</h1>
          </div>
        </div>

        <div class="header-actions">
          <button id="theme-toggle" class="header-btn" onclick="toggleTheme()" title="Toggle Theme">
            <i class="fa-solid fa-moon"></i>
          </button>
          <button class="header-btn" onclick="Auth.showToast('No new notifications.', 'info')" title="Notifications">
            <i class="fa-solid fa-bell"></i>
          </button>
        </div>
      </header>

      <!-- Main Layout Body -->
      <div class="main-content">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
          
          <!-- Card 1: Profile Details Customizations (Profiling updates) -->
          <div class="dashboard-card glass-panel" style="min-height: auto; justify-content: flex-start; padding: 32px;">
            <div class="dashboard-card-title" style="margin-bottom: 20px; border-bottom: 1px solid var(--panel-border); padding-bottom: 16px;">
              <h2>Edit Personal Information</h2>
            </div>
            
            <form id="profile-settings-form" onsubmit="handleProfileUpdateSubmit(event)">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="set-name" class="form-control" disabled style="opacity: 0.6; cursor: not-allowed;">
                <p class="form-helper">Name locks are managed by the administrator</p>
              </div>

              <div class="form-group">
                <label class="form-label" for="set-phone">Phone Number</label>
                <input type="tel" id="set-phone" class="form-control" placeholder="+63 (917) 000-0000" required>
              </div>

              <div class="form-group">
                <label class="form-label" for="set-address">Home Address</label>
                <input type="text" id="set-address" class="form-control" placeholder="City, Province" required>
              </div>

              <div class="form-group">
                <label class="form-label" for="set-avatar-seed">Profile Avatar seed</label>
                <div style="display: flex; gap: 12px; align-items: center;">
                  <input type="text" id="set-avatar-seed" class="form-control" placeholder="Seed value" oninput="previewAvatarSeed(this.value)">
                  <img id="set-avatar-preview" src="" alt="Avatar Preview" style="width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--panel-border); background: rgba(255,255,255,0.05);">
                </div>
                <p class="form-helper">Type any keyword to randomize your profile graphic</p>
              </div>

              <button type="submit" class="btn btn-primary" style="margin-top: 10px;">
                <i class="fa-solid fa-floppy-disk"></i> Save Personal Details
              </button>
            </form>
          </div>

          <!-- Card 2: Security & Passwords change (User account management) -->
          <div class="dashboard-card glass-panel" style="min-height: auto; justify-content: flex-start; padding: 32px;">
            <div class="dashboard-card-title" style="margin-bottom: 20px; border-bottom: 1px solid var(--panel-border); padding-bottom: 16px;">
              <h2>Security Credentials</h2>
            </div>
            
            <form id="security-settings-form" onsubmit="handlePasswordUpdateSubmit(event)">
              <div class="form-group">
                <label class="form-label" for="set-current-pass">Current Password</label>
                <input type="password" id="set-current-pass" class="form-control" placeholder="••••••••" required>
              </div>

              <div class="form-group">
                <label class="form-label" for="set-new-pass">New Password</label>
                <input type="password" id="set-new-pass" class="form-control" placeholder="••••••••" required>
              </div>

              <div class="form-group">
                <label class="form-label" for="set-confirm-pass">Confirm New Password</label>
                <input type="password" id="set-confirm-pass" class="form-control" placeholder="••••••••" required>
              </div>

              <button type="submit" class="btn btn-danger" style="margin-top: 10px;">
                <i class="fa-solid fa-shield-halved"></i> Update Password Credentials
              </button>
            </form>
          </div>

        </div>
      </div>
    </main>
  </div>

  <!-- Javascript Modules -->
  <script src="js/database.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/settings.js"></script>
  <script>
    // Navigation Drawer Mobil
    function toggleMobileSidebar() {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("sidebar-overlay");
      sidebar.classList.toggle("open");
      overlay.classList.toggle("open");
    }

    // Theme triggers
    function toggleTheme() {
      const body = document.body;
      const themeIcon = document.querySelector("#theme-toggle i");
      if (body.classList.contains("light-theme")) {
        body.classList.remove("light-theme");
        localStorage.setItem("ems_theme", "dark");
        themeIcon.className = "fa-solid fa-sun";
      } else {
        body.classList.add("light-theme");
        localStorage.setItem("ems_theme", "light");
        themeIcon.className = "fa-solid fa-moon";
      }
    }

    (function initTheme() {
      const savedTheme = localStorage.getItem("ems_theme") || "dark";
      const body = document.body;
      const themeIcon = document.querySelector("#theme-toggle i");
      if (savedTheme === "light") {
        body.classList.add("light-theme");
        themeIcon.className = "fa-solid fa-moon";
      } else {
        body.classList.remove("light-theme");
        themeIcon.className = "fa-solid fa-sun";
      }
    })();
  </script>
</body>
</html>
