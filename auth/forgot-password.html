<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMS Portal | Recover Password</title>
  
  <!-- CSS Linkages -->
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/auth.css">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="auth-body">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="auth-container glass-panel">
    <div class="auth-header">
      <div class="auth-logo">
        <i class="fa-solid fa-key"></i>
      </div>
      <h2>Recover Password</h2>
      <p>Enter your email and we'll dispatch reset credentials</p>
    </div>

    <form id="forgot-form" onsubmit="handleForgot(event)">
      <div class="form-group">
        <label class="form-label" for="forgot-email">Registered Email Address</label>
        <div class="input-icon-group">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="forgot-email" class="form-control" placeholder="name@company.com" required autocomplete="email">
        </div>
        <p class="form-helper">For testing, you can use: admin@company.com or hr@company.com</p>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; height: 48px;">
        Verify Account <i class="fa-solid fa-arrow-right"></i>
      </button>

      <div class="auth-footer">
        Remembered your details? <a href="login.html">Return to Login</a>
      </div>
    </form>
  </div>

  <!-- Javascript Modules -->
  <script src="../js/database.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    function handleForgot(event) {
      event.preventDefault();
      const email = document.getElementById("forgot-email").value.trim();
      Auth.forgotPassword(email);
    }
  </script>
</body>
</html>
