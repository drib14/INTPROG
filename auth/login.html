<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMS Portal | Log In</title>
  
  <!-- CSS Linkages -->
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/auth.css">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="auth-body">
  <!-- Dynamic Blobs for Premium Visual Effect -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="auth-container glass-panel">
    <div class="auth-header">
      <div class="auth-logo">
        <i class="fa-solid fa-people-roof"></i>
      </div>
      <h2>Welcome Back</h2>
      <p>Log in to access your dashboard</p>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <div class="input-icon-group">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="login-email" class="form-control" placeholder="name@company.com" required autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div class="input-icon-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>

      <div class="auth-actions">
        <label class="checkbox-container">
          <input type="checkbox" id="remember-me">
          <span class="custom-checkmark"></span>
          Remember me
        </label>
        <a href="forgot-password.html">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; height: 48px;">
        Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>
      </button>

    </form>
  </div>

  <!-- Javascript Modules -->
  <script src="../js/database.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // Autoload remembered email if present
    document.addEventListener("DOMContentLoaded", () => {
      // Session protection: if already logged in, bypass login screen
      const currentUser = DB.getCurrentUser();
      if (currentUser) {
        if (currentUser.role === "employee") {
          window.location.href = "../employee-dashboard.html";
        } else {
          window.location.href = "../dashboard.html";
        }
        return;
      }
      
      const remembered = localStorage.getItem("ems_remembered_email");
      if (remembered) {
        document.getElementById("login-email").value = remembered;
        document.getElementById("remember-me").checked = true;
      }
    });

    function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById("login-email").value;
      const pass = document.getElementById("login-password").value;
      const remember = document.getElementById("remember-me").checked;
      
      Auth.login(email, pass, remember);
    }
  </script>
</body>
</html>
