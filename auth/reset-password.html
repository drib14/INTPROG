<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMS Portal | Reset Password</title>
  
  <!-- CSS Linkages -->
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/auth.css">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="auth-body">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="auth-container glass-panel">
    <div class="auth-header">
      <div class="auth-logo">
        <i class="fa-solid fa-lock-open"></i>
      </div>
      <h2>Set New Password</h2>
      <p id="reset-desc">Update security credentials for your account</p>
    </div>

    <form id="reset-form" onsubmit="handleReset(event)">
      <div class="form-group">
        <label class="form-label" for="reset-password">New Password</label>
        <div class="input-icon-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="reset-password" class="form-control" placeholder="••••••••" required autocomplete="new-password">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="reset-confirm">Confirm New Password</label>
        <div class="input-icon-group">
          <i class="fa-solid fa-shield-halved"></i>
          <input type="password" id="reset-confirm" class="form-control" placeholder="••••••••" required autocomplete="new-password">
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; height: 48px;">
        Update Password <i class="fa-solid fa-check"></i>
      </button>

      <div class="auth-footer">
        Aborted session? <a href="login.html">Return to Login</a>
      </div>
    </form>
  </div>

  <!-- Javascript Modules -->
  <script src="../js/database.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // Safeguard reset process
    document.addEventListener("DOMContentLoaded", () => {
      const email = localStorage.getItem("ems_reset_target_email");
      if (!email) {
        Auth.showToast("No active password recovery session. Redirecting...", "error");
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);
      } else {
        document.getElementById("reset-desc").textContent = `Updating password for: ${email}`;
      }
    });

    function handleReset(event) {
      event.preventDefault();
      const pass = document.getElementById("reset-password").value;
      const confirm = document.getElementById("reset-confirm").value;
      Auth.resetPassword(pass, confirm);
    }
  </script>
</body>
</html>
